# Nginx config for Tap-N-Eat — HTTP + HTTPS on the same EC2 instance
# ─────────────────────────────────────────────────────────────
# SETUP STEPS (run on EC2 as ubuntu/ec2-user):
#
#   1. Install certbot:
#        sudo apt-get install -y certbot python3-certbot-nginx
#
#   2. Copy this file:
#        sudo cp tapneat.nginx.conf /etc/nginx/sites-available/tapneat
#        sudo ln -sf /etc/nginx/sites-available/tapneat /etc/nginx/sites-enabled/tapneat
#        sudo rm -f /etc/nginx/sites-enabled/default
#
#   3. Get free SSL certificate (uses sslip.io — no domain purchase needed):
#        sudo certbot --nginx -d 13-60-223-109.sslip.io --non-interactive --agree-tos -m admin@tapneat.com
#
#   4. Reload nginx:
#        sudo nginx -t && sudo systemctl reload nginx
#
#   5. Auto-renew (certbot installs this automatically, verify with):
#        sudo systemctl status certbot.timer
# ─────────────────────────────────────────────────────────────

# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    server_name 13-60-223-109.sslip.io 13.60.223.109;
    return 301 https://13-60-223-109.sslip.io$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name 13-60-223-109.sslip.io;

    # SSL certificates (filled in by certbot)
    ssl_certificate     /etc/letsencrypt/live/13-60-223-109.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13-60-223-109.sslip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── React frontend (static files) ─────────────────────
    root /var/www/tapneat;
    index index.html;

    # ── Proxy all /api/* requests to the Node.js backend ──
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      'upgrade';
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        client_max_body_size 10M;
    }

    # ── Serve frontend for all other routes (React Router) ─
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Serve uploaded school logos ────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Cache static assets aggressively ──────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
